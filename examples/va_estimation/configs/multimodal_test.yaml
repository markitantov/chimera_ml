seed: 0
experiment_info:
  params:
    experiment_name: "va_estimation_fusion"
    run_name: "fusion"
    datetime_format: "%Y-%m-%d_%H-%M"

data:
  name: "fusion_va_datamodule"
  params:
    audio:
      path: "data/features/audio_features_w_fcl_new"
      emb_size: 256
    use_predictions: true
    target_source_modality: "face"
    target_source_field: "label"
    frame_index_offset: 1
    mask_audio: true
    audio_min_open_sec: 1
    audio_min_coverage_ratio: 0.8
    pin_memory: false
    num_workers: 1
    modalities:
      face:
        path: "data/features/face_features"
        emb_size: 256
      qwen_mm:
        path: "data/features/qwen_mm"
        emb_size: 256
      qwen_v:
        path: "data/features/qwen_v"
        emb_size: 128

model:
  name: "fusion_model"
  params:
    use_predictions: true
    context_modality: "audio"
    frame_modalities:
    - "face"
    - "qwen_mm"
    hidden: 256
    dropout: 0.1
    num_heads: 4
    num_temporal_layers: 1
    num_context_latents: 4
    modality_priors:
      face: 0.15
      qwen_mm: 0.85

train:
  params:
    epochs: 10
    mixed_precision: true
    device: "cuda"
    log_every_steps: 50
    grad_clip_norm: 1.0
    use_scheduler: true
    scheduler_step_per_epoch: true
    scheduler_monitor: "val_framewise/va_ccc_metric"
    collect_cache: false

optimizer:
  name: "adamw_optimizer"
  params:
    lr: 5e-5
    weight_decay: 0.01

loss:
  name: "fusion_ccc_mse_loss"
  params:
    ccc_weight: 1
    mse_weight: 0.01
    v_weight: 0.7
    a_weight: 0.3

metrics:
  - name: "va_ccc_metric"
    params: {}

callbacks:
  - name: "fusion_framewise_callback"
    params:
      loader_name: "train"
      log_prefix: "train_framewise"
      ann_root: "data/labels/VA_Estimation_Challenge"
      ann_split_dir: "Train_Set"
      overlap_strategy: "mean"
      dump_pickle: true
      pickle_path: "submit/train.pkl"
      fill_missing_gt_frames: True
      frame_index_offset: 1
  - name: "fusion_framewise_callback"
    params:
      loader_name: "val"
      log_prefix: "val_framewise"
      ann_root: "data/labels/VA_Estimation_Challenge"
      ann_split_dir: "Validation_Set"
      overlap_strategy: "mean"
      smoothing: "moving_average"
      smoothing_valence_param: 9 # 7-13, or 9-11
      smoothing_arousal_param: 11
      dump_pickle: true
      pickle_path: "submit/val.pkl"
      fill_missing_gt_frames: True
      frame_index_offset: 1
  - name: "fusion_framewise_callback"
    params:
      loader_name: "test"
      log_prefix: "test_framewise"
      ann_root: "data/labels/VA_Estimation_Challenge"
      ann_split_dir: "Test_Set"
      overlap_strategy: "mean"
      smoothing: "moving_average"
      smoothing_valence_param: 9 # 7-13, or 9-11
      smoothing_arousal_param: 11
      dump_pickle: true
      pickle_path: "submit/test.pkl"
      frame_index_offset: 1
      fill_missing_gt_frames: True
      submission_template_path: "data/ABAW_VA_test_set_example.txt"
      submission_out_path: "Submit_new.txt"
