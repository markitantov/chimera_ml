pipeline:
  name: "oragen_inference"
  parallel: false

steps:
  - name: "extract_audio_step"
    params:
      sample_rate: 16000
  
  - name: "vad_step"
  
  - name: "face_detection_step"
    params:
      model: "yolo26n.pt"
      fps: 1.0
  
  - name: "build_windows_step"
    params:
      win_max_length: 4
      win_shift: 2
      win_min_length: 1
  
  - name: "extract_features_step"
    params:
      gender_class_names: ["female", "male"]
      age_scale: 100.0
      audio_checkpoint: "https://huggingface.co/markitantov/ORAGEN/resolve/main/audio_model.pt"
      image_checkpoint: "https://huggingface.co/markitantov/ORAGEN/resolve/main/image_model.pt"
  
  - name: "fusion_step"
    params:
      checkpoint: "https://huggingface.co/markitantov/ORAGEN/resolve/main/multimodal_model.pt"

  - name: "aggregate_windows_step"

  - name: "print_json_predictions_step"
