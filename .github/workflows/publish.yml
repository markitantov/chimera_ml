name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (true/false)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Poetry Check
        run: poetry check

      - name: Build distributions
        run: poetry build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  require-ci-success:
    if: ${{ github.event_name == 'release' || github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Ensure CI passed for this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "ci.yml",
              head_sha: sha,
              status: "completed",
              per_page: 50,
            });

            const successRun = runs.data.workflow_runs.find((run) => run.conclusion === "success");
            if (!successRun) {
              const summary = runs.data.workflow_runs
                .map((run) => `#${run.run_number}:${run.conclusion}`)
                .join(", ");
              core.setFailed(
                `Publish is blocked: no successful CI run found for commit ${sha}. ` +
                `Completed CI runs for this commit: ${summary || "none"}.`
              );
              return;
            }

            core.info(`CI gate passed: ${successRun.html_url}`);

  publish-pypi:
    if: ${{ github.event_name == 'release' || github.event.inputs.publish == 'true' }}
    needs:
      - build
      - require-ci-success
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
